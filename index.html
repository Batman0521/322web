<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Миний Портфолио</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts & FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="logo">Bat-Ochir.<span>dev</span></div>
        <ul id="nav-links">
            <li><a href="#home">Нүүр</a></li>
            <li><a href="#skills">Ур чадвар</a></li>
            <li><a href="#projects">Төслүүд</a></li>
            <li><a href="#courses">Хичээлүүд</a></li>

    <!-- Hero -->

            <p id="hero-subtitle">Вэб хөгжүүлэгч, Оюутан</p>

    <section id="skills">
        <h2 class="section-title">Ур чадварууд</h2>
        <div id="skills-container" class="grid-container"></div>

    <!-- Projects -->
    <section id="projects">
        <h2 class="section-title">Миний төслүүд</h2>
        <div id="projects-container" class="grid-container"></div>
    </section>

    <!-- Courses -->
    <section id="courses">
        <h2 class="section-title">Хичээлийн явц</h2>
        <div id="courses-container"></div>
    </section>

    <footer>
        <p id="footer-text">© 2026 Bat-Ochir Portfolio</p>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
