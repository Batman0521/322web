<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <h1>Удирдах хэсэг</h1>

    <!-- Ур чадвар нэмэх хэсэг -->
    <section>
        <h2>Шинэ Skill нэмэх</h2>
        <form id="add-skill-form">
            <input type="text" id="skill-name" placeholder="Skill-ийн нэр (Жишээ: React)" required>
            <input type="text" id="skill-icon" placeholder="Icon (Emoji эсвэл Class)" required>
            <select id="skill-level">
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>
            <button type="submit">Хадгалах</button>
        </form>
    </section>

    <script type="module" src="admin.js"></script>
</body>
</html>
